    <!-- FIREBASE SETUP -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // --- PASTE YOUR FIREBASE CONFIG HERE ---
        // You can find this in Firebase Console -> Project Settings -> General -> Your Apps
        const firebaseConfig = {
  apiKey: "AIzaSyC4Ur1MsWGyB-MQzS4QQp2ZEWhoUUGhBRI",
  authDomain: "seedly-c723e.firebaseapp.com",
  projectId: "seedly-c723e",
  storageBucket: "seedly-c723e.firebasestorage.app",
  messagingSenderId: "948687707686",
  appId: "1:948687707686:web:ed51b53c65763184b1d0e7",
  measurementId: "G-G8H93KRTCX"
};
        // ----------------------------------------

        let db;
        
        try {
            // Only initialize if config is replaced
            if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                console.log("Firebase initialized for Waitlist");
            } else {
                console.warn("⚠️ Firebase Config missing. Emails won't be saved until you update lines 33-40.");
            }
        } catch (e) {
            console.error("Firebase Error:", e);
        }

        // Expose function to React
        window.submitToWaitlist = async (email) => {
            if (!db) {
                alert("This is a demo. To save emails, please add your Firebase Config to the HTML file.");
                return false;
            }
            try {
                await addDoc(collection(db, "waitlist"), {
                    email: email,
                    timestamp: serverTimestamp(),
                    source: 'web_landing'
                });
                return true;
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Something went wrong. Please try again.");
                return false;
            }
        };
    </script>
